services:
  ros2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: jazzy

    container_name: hand_servo_ros2
    user: "${UID}:${GID}"
    group_add:
      - "20"
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - PYTHONUNBUFFERED=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ..:/workspace

    devices:
      - /dev/ttyACM0:/dev/ttyACM0

    working_dir: /workspace