bridge:
  ros__parameters:

    # ==========================================================
    # Simulator
    # ==========================================================

    map_path: "/ros2_ws/src/my_f1tenth_bridge/assets/maps/levine"
    map_ext: ".png"

    initial_x: 0.0
    initial_y: 0.0
    initial_theta: 0.0

    scan_rate_hz: 10.0

    # ==========================================================
    # Topics
    # ==========================================================

    scan_topic: "/scan"
    odom_topic: "/odom"
    drive_topic: "/drive"

    # ==========================================================
    # Frames
    # ==========================================================

    frame_id: "laser_model"
    odom_frame: "odom"
    base_frame: "base_link"

    # ==========================================================
    # Laser
    # ==========================================================

    scan_angle_min: -2.35
    scan_angle_max: 2.35

    range_min: 0.0
    range_max: 30.0



#=================================

pure_pursuit_planner:
  ros__parameters:
    odom_topic: /odom
    drive_topic: /drive
    lookahead_distance: 1.5
    target_speed: 0.6
    wheelbase: 0.33
    control_rate_hz: 20.0

    